<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Portfólio</title>
    <!-- link para ficheiro styles.css com regras de estilização -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'portfolio/styles.css' %}">

    <!-- ... -->
</head>
<body>
    <header>
        <h1>Portfólio</h1>
        <nav>
            <a href="{% url 'portfolio_home' %}">Home</a>
            <a href="{% url 'portfolio_cursos' %}">Cursos</a>
            <a href="{% url 'portfolio_ucs' %}">UCs</a>
            <a href="{% url 'portfolio_professores' %}">Professores</a>
            <a href="{% url 'portfolio_alunos' %}">Alunos</a>
            <a href="{% url 'portfolio_projetos' %}">Projetos</a>
            <a href="{% url 'portfolio_tfcs' %}">TFCs</a>
            <a href="{% url 'portfolio_tecnologias' %}">Tecnologias</a>
            <a href="{% url 'artigos' %}">Artigos</a>

            {% if request.user.is_authenticated %}
                <span>Olá, {{ request.user.username }}</span>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'registo' %}">Registo</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>
</body>
</html>
